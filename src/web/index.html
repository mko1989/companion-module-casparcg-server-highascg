<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>CasparCG — Live Control</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app" class="app">
		<header class="header">
			<h1 class="header__title">CasparCG</h1>
			<div class="header__status" id="ws-status">
				<span class="status-dot" id="status-dot"></span>
				<span class="status-text" id="status-text">Connecting…</span>
			</div>
		</header>

		<div class="layout">
			<aside class="panel panel-sources" id="panel-sources">
				<div class="panel__header">
					<h2>Sources</h2>
				</div>
				<div class="panel__body" id="sources-panel-body"></div>
			</aside>
			<div class="resize-handle resize-handle--sources" id="resize-sources" title="Drag to resize"></div>

			<main class="workspace">
				<div class="workspace__tabs">
					<button class="tab active" data-tab="dashboard">Dashboard</button>
					<button class="tab" data-tab="timeline">Timeline Editor</button>
					<button class="tab" data-tab="multiview">Multiview Editor</button>
				</div>
				<div class="workspace__content">
					<div class="tab-pane active" id="tab-dashboard"></div>
					<div class="tab-pane" id="tab-timeline"></div>
					<div class="tab-pane" id="tab-multiview"></div>
				</div>
			</main>

			<aside class="panel panel-inspector" id="panel-inspector">
				<div class="panel__header">
					<h2>Inspector</h2>
				</div>
				<div class="panel__body" id="panel-inspector-body">
					<p class="placeholder">Select an item</p>
				</div>
			</aside>
		</div>
	</div>

	<script type="module" src="app.js"></script>
</body>
</html>
